// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt  = v => v==null?"—":new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(v);
const fmtK = v => !v?"0":v>=1000?`${(v/1000).toFixed(1)}k€`:`${Math.round(v)}€`;
const pct  = (a,b) => b?(((a-b)/b)*100):null;
const clrD = d => d==null?T.txt3:d>0?T.green:d<0?T.red:T.txt2;
const arrD = d => d==null?"":d>0?"▲":d<0?"▼":"—";
const wmoI = c => {if(c===0)return"☀️";if(c<=2)return"🌤";if(c===3)return"☁️";if(c<=48)return"🌫";if(c<=55)return"🌦";if(c<=65)return"🌧";if(c<=75)return"❄️";if(c<=82)return"🌦";return"⛈";};
const wmoT = c => {if(c===0)return"Soleil";if(c<=2)return"Peu nuageux";if(c===3)return"Couvert";if(c<=48)return"Brouillard";if(c<=55)return"Bruine";if(c<=65)return"Pluie";if(c<=75)return"Neige";if(c<=82)return"Averses";return"Orage";};
function pearson(xs,ys){const n=xs.length;if(n<3)return 0;const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;const num=xs.reduce((a,x,i)=>a+(x-mx)*(ys[i]-my),0);const den=Math.sqrt(xs.reduce((a,x)=>a+(x-mx)**2,0)*ys.reduce((a,y)=>a+(y-my)**2,0));return den?(num/den):0;}
function estimateCA(rain,pairs){if(!pairs.length)return null;const n=pairs.length,mx=pairs.reduce((a,p)=>a+p.x,0)/n,my=pairs.reduce((a,p)=>a+p.y,0)/n;const b=pairs.reduce((a,p)=>a+(p.x-mx)*(p.y-my),0)/Math.max(pairs.reduce((a,p)=>a+(p.x-mx)**2,0),1);return Math.max(0,Math.round((my-b*mx)+b*rain));}
function probaObj(rain,obj,pairs){if(!pairs.length||!obj)return null;const pool=pairs.filter(p=>Math.abs(p.x-rain)<=3);const p=pool.length>=5?pool:pairs;return Math.round(p.filter(x=>x.y>=obj).length/p.length*100);}

function parseSheetRows(rows) {
  const result = {};
  if (!Array.isArray(rows)) return result;
  rows.forEach(row => {
    for (let c = 0; c < Math.min(row.length, 4); c++) {
      const cell = String(row[c] ?? "").toUpperCase().replace(/\s+/g," ").trim();
      if (!cell.includes("TOTAL")) continue;
      let mIdx = -1;
      Object.entries(MONTH_MAP).forEach(([k,v]) => { if(cell.includes(k)) mIdx = v; });
      if (mIdx === -1) continue;
      for (let i = 8; i < row.length; i++) {
        const raw = String(row[i] ?? "").replace(/\s/g,"").replace(",",".");
        const val = parseFloat(raw.replace(/[^\d.-]/g,""));
        if (val > 0 && !isNaN(val)) { result[MONTHS[mIdx]] = val; break; }
      }
      break;
    }
  });
  return result;
}

// ── UI ATOMS ──────────────────────────────────────────────────────────────────
const Card = ({children,style={}}) => <div style={{background:T.card,borderRadius:14,border:`0.5px solid ${T.border}`,padding:"18px 20px",...style}}>{children}</div>;
const SLbl = ({children}) => <div style={{fontSize:10,fontWeight:500,letterSpacing:"0.07em",textTransform:"uppercase",color:T.txt3,marginBottom:10}}>{children}</div>;
const DeltaBadge = ({d,size=12}) => d==null?null:<span style={{fontSize:size,fontWeight:500,color:clrD(d)}}>{arrD(d)} {Math.abs(d).toFixed(1)}%</span>;
const NavBtn = ({l,a,onClick}) => <button onClick={onClick} style={{fontFamily:font,fontSize:12,fontWeight:a?600:400,color:a?T.txt:T.txt2,background:a?T.card:"transparent",border:a?`0.5px solid ${T.border}`:"0.5px solid transparent",borderRadius:8,padding:"6px 14px",cursor:"pointer",outline:"none"}}>{l}</button>;
const CTooltip = ({active,payload,label}) => {
  if(!active||!payload?.length)return null;
  return <div style={{background:T.card,border:`0.5px solid ${T.border}`,borderRadius:8,padding:"8px 12px",fontSize:12}}>

      <span style={{fontWeight:600,color:T.txt,marginLeft:"auto"}}>{p.value!=null?fmt(p.value):"—"}</span>
    </div>)}

};

function Gauge({value,target,label,size=120}){
  const r=46,cx=size/2,cy=size/2+8;
  const toXY=deg=>{const rad=((deg-180)*Math.PI/180);return[cx+r*Math.cos(rad),cy+r*Math.sin(rad)];};
  const ratio=target>0?Math.min(value/target,1.1):0;
  const angle=ratio*180;const[x1,y1]=toXY(0);const[x2,y2]=toXY(angle);
  const large=angle>180?1:0;
  const fill=ratio>=1?T.green:ratio>=0.7?"#111":ratio>=0.4?"#555":"#ccc";
  return <div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center"}}>
    <svg width={size} height={size*0.62} viewBox={`0 0 ${size} ${size*0.62}`}>
      <path d={`M ${toXY(0)[0]} ${toXY(0)[1]} A ${r} ${r} 0 1 1 ${toXY(180)[0]} ${toXY(180)[1]}`} fill="none" stroke={T.card2} strokeWidth={8} strokeLinecap="round"/>
      {ratio>0.01&&<path d={`M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`} fill="none" stroke={fill} strokeWidth={8} strokeLinecap="round"/>}
      <text x={cx} y={cy+1} textAnchor="middle" fontSize={12} fontWeight={600} fontFamily={font} fill={T.txt}>{fmtK(value)}</text>
      <text x={cx} y={cy+13} textAnchor="middle" fontSize={9} fontFamily={font} fill={T.txt3}>/ {fmtK(target)}</text>
    </svg>
    <div style={{fontSize:11,fontWeight:500,color:T.txt2,marginTop:-2}}>{label}</div>
  </div>;
}

function ProgressRow({m,n,n1}){
  if(!n1&&!n)return null;
  const d=pct(n,n1);
  const w=n1>0?Math.min((n/n1)*100,140):0;
  return <div style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0"}}>
    <div style={{width:28,fontSize:12,fontWeight:500,color:T.txt2,flexShrink:0}}>{m}</div>
    <div style={{flex:1,position:"relative",height:14,background:T.card2,borderRadius:4,overflow:"hidden"}}>
      <div style={{position:"absolute",left:0,top:0,width:`${Math.min(w*0.714,100)}%`,height:"100%",background:n>=n1?T.green:"#111",borderRadius:4,opacity:0.85}}/>
      <div style={{position:"absolute",left:"71.4%",top:0,width:"1.5px",height:"100%",background:T.border2}}/>
    </div>
    <div style={{width:42,fontSize:11,fontWeight:600,color:clrD(d),textAlign:"right",flexShrink:0}}>{d!=null?(d>=0?"+":"")+Math.round(d)+"%":"—"}</div>

  </div>;
}

function AlerteBanner({rain,proba,objJour,demain}){
  if(proba==null)return null;
  const bon=proba>=60,neutre=proba>=40;
  const bg=bon?"#f0faf0":neutre?"#fffbeb":"#fff5f5";
  const bdr=bon?"#a5d6a7":neutre?"#fde68a":"#ffcdd2";
  const ic=bon?"🎯":neutre?"〰️":"⚠️";
  const lbl=bon?"Fort potentiel":neutre?"Potentiel modéré":"Journée difficile";
  const c=bon?T.green:neutre?"#b45309":T.red;
  return <div style={{background:bg,border:`1px solid ${bdr}`,borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
    <span style={{fontSize:28}}>{ic}</span>
    <div style={{flex:1}}>
      <div style={{fontSize:13,fontWeight:600,color:c}}>{demain?"Demain — ":""}{lbl}</div>
      <div style={{fontSize:12,color:T.txt2,marginTop:2}}>{demain?"Prévision":"Aujourd'hui"} : 💧{rain}mm · objectif {fmtK(objJour)}</div>
    </div>
    <div style={{textAlign:"center",minWidth:56}}>
      <div style={{fontSize:28,fontWeight:700,color:c,lineHeight:1}}>{proba}%</div>
      <div style={{fontSize:10,color:T.txt3}}>probabilité</div>
    </div>
  </div>;
}

function VueJour({wxToday,wxForecast,wxHist,ca_n,ca_n1,growth,wxDaily}){
  const today=new Date(),mIdx=today.getMonth(),mKey=MONTHS[mIdx],mm=MM[mIdx],dd=today.getDate()-1;
  const caJN1=DJ_N1[mm]?.[dd]??null;
  const objJour=caJN1!=null?Math.round(caJN1*(1+growth/100)):null;
  const caMN=ca_n[mKey]??0,caMN1=ca_n1[mKey]??0;
  const moisNOK=MONTHS.filter(m=>ca_n[m]!=null);
  const totalN=moisNOK.reduce((a,m)=>a+(ca_n[m]||0),0);
  const totalN1S=moisNOK.reduce((a,m)=>a+(ca_n1[m]||0),0);
  const objMois=caMN1?Math.round(caMN1*(1+growth/100)):null;
  const objAnnuel=MONTHS.reduce((a,m)=>a+(ca_n1[m]?Math.round(ca_n1[m]*(1+growth/100)):0),0);
  const pairs=useMemo(()=>{
    const p=[];
    Object.entries(DJ_N1).forEach(([mm,arr])=>{const wx=wxDaily[`n1-${mm}`]||[];(arr||[]).forEach((ca,i)=>{if(wx[i]&&ca>0)p.push({x:+(wx[i].rain||0).toFixed(1),y:ca});});});
    Object.entries(DJ_N).forEach(([mm,arr])=>{const wx=wxDaily[mm]||[];(arr||[]).forEach((ca,i)=>{if(wx[i]&&ca>0)p.push({x:+(wx[i].rain||0).toFixed(1),y:ca});});});
    return p;
  },[wxDaily]);
  const rainAuj=wxToday?.rain??null,rainDem=wxForecast?.[1]?.rain??null;
  const probaAuj=rainAuj!=null?probaObj(rainAuj,objJour,pairs):null;
  const probaDem=rainDem!=null?probaObj(rainDem,objJour,pairs):null;
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    {probaAuj!=null&&<AlerteBanner rain={rainAuj} proba={probaAuj} objJour={objJour} demain={false}/>}
    {probaDem!=null&&<AlerteBanner rain={rainDem} proba={probaDem} objJour={objJour} demain={true}/>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
      {[{label:"Objectif du jour",n:objJour,n1:caJN1,sub:"N-1 même jour"},{label:`CA ${mKey}`,n:caMN,n1:caMN1,sub:"N-1"},{label:"YTD",n:totalN,n1:totalN1S,sub:"N-1 même période"},{label:"Objectif annuel",n:totalN,n1:objAnnuel,sub:"objectif"}].map(({label,n,n1,sub},i)=>(
        <Card key={i} style={{padding:"14px 16px"}}>
          <div style={{fontSize:11,color:T.txt3,marginBottom:6}}>{label}</div>
          <div style={{fontSize:20,fontWeight:600,marginBottom:2}}>{fmt(n)}</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:T.txt3}}>{sub} {fmt(n1)}</span>
            {n!=null&&n1&&<DeltaBadge d={pct(n,n1)}/>}
          </div>
        </Card>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card>
        <SLbl>Progression objectifs</SLbl>
        <div style={{display:"flex",justifyContent:"space-around",paddingTop:4}}>
          <Gauge value={caMN} target={objMois||1} label={`CA ${mKey}`} size={110}/>
          <Gauge value={totalN} target={objAnnuel} label="Annuel" size={110}/>
          <Gauge value={totalN} target={totalN1S||1} label="vs N-1" size={110}/>
        </div>
      </Card>
      <Card>
        <SLbl>Météo Chamonix</SLbl>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{title:"Aujourd'hui",wx:wxToday,ca:null},{title:"Même jour N-1",wx:wxHist,ca:caJN1}].map(({title,wx,ca},i)=>(
            <div key={i} style={{background:T.card2,borderRadius:10,padding:"12px",border:`0.5px solid ${T.border}`}}>
              <div style={{fontSize:11,color:T.txt3,marginBottom:6}}>{title}</div>
              {wx?<><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontSize:28}}>{wmoI(wx.code)}</span>
                <div><div style={{fontSize:18,fontWeight:600}}>{wx.tmax}°C</div>
                <div style={{fontSize:11,color:T.txt3}}>💧{wx.rain}mm</div></div>
              </div>
              <div style={{fontSize:11,color:T.txt2}}>{wmoT(wx.code)}</div>
              {ca!=null&&<div style={{fontSize:12,fontWeight:600,marginTop:4}}>{fmt(ca)}</div>}
              </>:<div style={{fontSize:12,color:T.txt3,paddingTop:8}}>Chargement…</div>}
            </div>
          ))}
        </div>
      </Card>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card>
        <SLbl>N vs N-1 par mois</SLbl>
        <div style={{borderBottom:`0.5px solid ${T.border}`,marginBottom:6,paddingBottom:3,display:"flex",justifyContent:"flex-end"}}><span style={{fontSize:10,color:T.txt3}}>│ = N-1</span></div>
        {MONTHS.filter(m=>ca_n[m]!=null||ca_n1[m]>0).map(m=><ProgressRow key={m} m={m} n={ca_n[m]||0} n1={ca_n1[m]||0}/>)}
      </Card>
      {wxForecast.length>0&&<Card>
        <SLbl>Prévisions 5 jours</SLbl>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:4}}>
          {wxForecast.map((f,i)=>{
            const s=f.rain>8?{l:"Fort",c:T.green}:f.rain>3?{l:"Favorable",c:"#1565c0"}:f.rain>0?{l:"Neutre",c:T.txt2}:{l:"Faible",c:T.red};
            return <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 10px",borderRadius:8,background:i===0?T.card2:"transparent"}}>
              <span style={{fontSize:11,fontWeight:500,color:T.txt3,width:28}}>{f.label}</span>
              <span style={{fontSize:18,width:24}}>{wmoI(f.code)}</span>
              <span style={{fontSize:13,fontWeight:600,width:36}}>{f.tmax}°C</span>
              <span style={{fontSize:11,color:T.txt3,width:40}}>💧{f.rain}mm</span>
              <span style={{fontSize:11,fontWeight:600,color:s.c,marginLeft:"auto"}}>{s.l}</span>
            </div>;
          })}
        </div>
      </Card>}
    </div>
  </div>;
}

function VueMois({ca_n,ca_n1,growth}){
  const obj=Object.fromEntries(MONTHS.map(m=>[m,ca_n1[m]?Math.round(ca_n1[m]*(1+growth/100)):null]));
  const data=MONTHS.map(m=>({m,"N(2026)":ca_n[m],"N-1(2025)":ca_n1[m],"Obj":obj[m]}));
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <Card><SLbl>Objectifs mensuels</SLbl>
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:"space-around",gap:6,paddingTop:8}}>
        {MONTHS.filter(m=>ca_n[m]!=null).map(m=><Gauge key={m} value={ca_n[m]} target={obj[m]||1} label={m} size={100}/>)}
      </div>

  const [syncStatus,setSyncStatus]=useState("");

  const syncSheets=useCallback(async()=>{
    setSyncing(true); setSyncStatus("sync…");
    try{
      const res=await fetch(APPS_SCRIPT_URL, {redirect:"follow"});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const text=await res.text();
      const json=JSON.parse(text.trim().replace(/^\uFEFF/,""));
      const n={...CA_N_STATIC}, n1={...CA_N1_STATIC};

      const apply=(rows, target)=>{ const found=parseSheetRows(rows); Object.assign(target,found); };

      if(Array.isArray(json)){
        // Tableau simple — cherche N-1 vs N par année dans les lignes
        apply(json, n);
      } else if(typeof json==="object"){
        // Objet multi-onglets
        Object.entries(json).forEach(([key,rows])=>{
          if(!Array.isArray(rows)) return;
          if(key.includes("26")) apply(rows, n);
          // N-1 locked: // N-1 locked: else if(key.includes("25")) apply(rows, n1);
          else apply(rows, n);
        });
      }

      // Sécurité : ne jamais écraser N-1 2025 avec des nulls
      MONTHS.forEach(m=>{ if(n1[m]==null) n1[m]=CA_N1_STATIC[m]; });

      setSyncStatus("erreur");
      console.warn("❌ Sync échouée:", e.message);

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:T.txt3}}>Objectif</span>
          <span style={{fontSize:12,fontWeight:600,color:growth>=0?T.green:T.red,minWidth:40}}>N-1 {growth>=0?"+":""}{growth}%</span>
          <input type="range" min={-20} max={80} step={5} value={growth} onChange={e=>setGrowth(+e.target.value)} style={{width:80,accentColor:"#111"}}/>
        </div>
        <button onClick={syncSheets} disabled={syncing} style={{fontFamily:font,fontSize:11,padding:"5px 12px",borderRadius:6,border:`0.5px solid ${syncStatus==="erreur"?"#ffcdd2":T.border}`,background:syncStatus==="erreur"?"#fff5f5":T.card2,cursor:syncing?"wait":"pointer",color:syncStatus==="erreur"?T.red:T.txt2,display:"flex",alignItems:"center",gap:5,minWidth:90}}>
          <span style={{fontSize:13}}>{syncing?"⏳":syncStatus==="erreur"?"⚠️":"↻"}</span>
          <span>{syncing?"sync…":syncStatus==="erreur"?"Erreur":lastSync?lastSync.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}):"Sync"}</span>
        </button>
      </div>
    </div>
    <div style={{background:T.card,borderBottom:`0.5px solid ${T.border}`,padding:"8px 20px"}}>
      <div style={{display:"flex",gap:2,background:T.card2,borderRadius:10,padding:3,border:`0.5px solid ${T.border}`,width:"fit-content"}}>
        {navItems.map(n=><NavBtn key={n.k} l={n.l} a={vue===n.k} onClick={()=>setVue(n.k)}/>)}
      </div>
    </div>
    <div style={{maxWidth:920,margin:"0 auto",padding:"20px 16px"}}>
      {vue==="jour"  && <VueJour wxToday={wxToday} wxForecast={wxForecast} wxHist={wxHist} ca_n={ca_n} ca_n1={ca_n1} growth={growth} wxDaily={wxDaily}/>}
      {vue==="mois"  && <VueMois ca_n={ca_n} ca_n1={ca_n1} growth={growth}/>}
      {vue==="annee" && <VueAnnee ca_n={ca_n} ca_n1={ca_n1} growth={growth}/>}
      {vue==="jours" && <VueJours wxDaily={wxDaily}/>}
      {vue==="meteo" && <VueMeteo wxToday={wxToday} wxForecast={wxForecast} wxHist={wxHist} wxDaily={wxDaily}/>}
    </div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
